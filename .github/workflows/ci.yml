name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: tradieflow
          POSTGRES_PASSWORD: tradieflow
          POSTGRES_DB: tradieflow_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Run API tests
        working-directory: apps/api
        env:
          DATABASE_URL: postgresql://tradieflow:tradieflow@localhost:5432/tradieflow_test
          JWT_ACCESS_SECRET: test-access-secret
          JWT_REFRESH_SECRET: test-refresh-secret
        run: pnpm test

      - name: Type-check API
        working-directory: apps/api
        run: pnpm build

      - name: Type-check mobile
        working-directory: apps/mobile
        run: pnpm build
